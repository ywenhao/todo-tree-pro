name: Publish VS Code Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test

  package:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - win32-x64
          - win32-arm64
          - linux-x64
          - linux-arm64
          - linux-armhf
          - darwin-x64
          - darwin-arm64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/package-target.mjs ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: todo-tree-pro-${{ matrix.target }}
          path: todo-tree-pro-${{ matrix.target }}.vsix
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: vsix
          merge-multiple: true
      - run: npx @vscode/vsce publish --packagePath vsix/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
